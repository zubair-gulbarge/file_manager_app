<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login | CloudBox</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#F9FAFB] min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="bg-blue-600 h-2 w-full"></div>
        
        <div class="p-8 md:p-10">
            <div class="text-center mb-10">
                <div class="inline-flex bg-blue-50 p-3 rounded-2xl mb-4 text-blue-600">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                </div>
                <h1 class="text-2xl font-black text-gray-900">Welcome Back</h1>
                <p class="text-gray-400 text-sm mt-2">Log in to manage your cloud storage</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="mb-6 p-4 text-sm font-bold rounded-xl {% if category == 'danger' %}bg-red-50 text-red-600 border border-red-100{% else %}bg-blue-50 text-blue-600 border border-blue-100{% endif %}">
                        {{ message }}
                    </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-widest ml-1">Username</label>
                    <input type="text" name="username" required 
                        class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-widest ml-1">Password</label>
                    <div class="relative">
                        <input type="password" name="password" id="passwordInput" required 
                            class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                        
                        <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-4 flex items-center text-gray-400 hover:text-blue-600 transition">
                            <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path id="eyePath" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>

                    <div id="strengthSection" class="hidden mt-3 space-y-2">
                        <div class="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                            <div id="strengthBar" class="h-full bg-red-500 transition-all duration-500" style="width: 0%"></div>
                        </div>
                        <p id="strengthText" class="text-[10px] font-black uppercase tracking-tighter text-red-500 text-right">Very Weak</p>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 shadow-lg shadow-blue-100 transition-all active:scale-[0.98]">
                    Sign In
                </button>
            </form>
        </div>
        
        <div class="bg-gray-50 p-6 border-t border-gray-100 text-center">
            <p class="text-xs text-gray-400 font-medium italic">Secure Multi-User File Management System</p>
        </div>
    </div>

    <script>
        // 1. Toggle Password Visibility
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const path = document.getElementById('eyePath');
            if (input.type === 'password') {
                input.type = 'text';
                path.setAttribute('d', 'M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878l-3.42-3.42m6.42 6.42l3.42 3.42');
            } else {
                input.type = 'password';
                path.setAttribute('d', 'M15 12a3 3 0 11-6 0 3 3 0 016 0z');
            }
        }

        // 2. Real-time Strength Meter
        document.getElementById('passwordInput').oninput = function(e) {
            const val = e.target.value;
            const section = document.getElementById('strengthSection');
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');
            
            if (val.length > 0) {
                section.classList.remove('hidden');
            } else {
                section.classList.add('hidden');
            }

            let score = 0;
            if (val.length > 7) score += 25;
            if (/[A-Z]/.test(val)) score += 25;
            if (/[0-9]/.test(val)) score += 25;
            if (/[^A-Za-z0-9]/.test(val)) score += 25;

            bar.style.width = score + '%';
            
            if (score <= 25) {
                bar.className = "h-full bg-red-500";
                text.innerText = "Very Weak";
                text.className = "text-[10px] font-black uppercase tracking-tighter text-red-500 text-right";
            } else if (score <= 50) {
                bar.className = "h-full bg-orange-400";
                text.innerText = "Moderate";
                text.className = "text-[10px] font-black uppercase tracking-tighter text-orange-400 text-right";
            } else if (score <= 75) {
                bar.className = "h-full bg-blue-500";
                text.innerText = "Strong";
                text.className = "text-[10px] font-black uppercase tracking-tighter text-blue-500 text-right";
            } else {
                bar.className = "h-full bg-emerald-500";
                text.innerText = "Excellent";
                text.className = "text-[10px] font-black uppercase tracking-tighter text-emerald-500 text-right";
            }
        };
    </script>
</body>
</html>
